# Pre-commit hooks configuration for OpenZIM MCP
# See https://pre-commit.com for more information

repos:
  # General code quality
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-docstring-first
      - id: debug-statements
      - id: name-tests-test
        args: ["--pytest-test-first"]
        # tests/dispatch_eval/ holds support modules (analyze, runner,
        # check_probe_coverage, gate_0_1_emission_spike, check_transport,
        # oneof_parse_benchmark) that are NOT pytest files; exclude every
        # non-``test_`` Python module there so editing one is committable.
        exclude: ^tests/dispatch_eval/(?!test_).*\.py$

  # Python code formatting — keep in lockstep with the dev-deps pin in
  # pyproject.toml so ``make format`` and pre-commit don't drift.
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3.12
        args: ["--line-length=88", "--target-version=py312"]

  # Import sorting
  - repo: https://github.com/pycqa/isort
    rev: 8.0.1
    hooks:
      - id: isort
        args: ["--profile=black", "--line-length=88"]

  # Linting
  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        # No flake8 plugins here: ``make lint`` / CI run plain flake8 from the
        # dev venv (no flake8-docstrings/bugbear/comprehensions/simplify), so
        # bundling those plugins as additional_dependencies made the local hook
        # STRICTER than CI — it blocked commits on ~hundreds of pre-existing
        # docstring (D-rule) / simplify violations the codebase already ships
        # and CI never flags. Keeping the plugin set empty makes the hook match
        # CI exactly, per this hook's own "can't drift away from CI" intent.
        # Read the same .flake8 that make lint / CI use (max-line-length=128).
        args: ["--config=.flake8"]

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        files: ^openzim_mcp/
        additional_dependencies:
          - pydantic
          - types-requests
        args: ["--python-version=3.12", "--ignore-missing-imports"]

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        # ``-ll`` (report MEDIUM+ only) matches the blocking CI gate
        # ``make security`` (``bandit -r openzim_mcp -ll``); without it the
        # hook flagged pre-existing LOW B110/B112 try/except findings that CI
        # never gates on, blocking commits to otherwise-clean files.
        args: ["-c", "pyproject.toml", "-ll"]
        additional_dependencies: ["bandit[toml]"]

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint
        args: ["--fix"]

  # YAML formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types: [yaml]
        args: ["--cache-location", ".cache/prettier"]

# Configuration for specific hooks
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: []
  submodules: false
