# CodeQL configuration for the openzim-mcp Python codebase.
#
# Most rules run with default settings. The exclusions below cover specific
# patterns that are intentional in this codebase and would otherwise produce
# false positives that drown out actionable findings.

name: openzim-mcp CodeQL config

paths:
  - openzim_mcp
  - tests

paths-ignore:
  - .venv
  - htmlcov
  - dist

query-filters:
  # The cyclic edge between ``openzim_mcp.zim_operations`` (a backward-compat
  # re-export shim) and the ``openzim_mcp.zim.*`` mixin modules is load-bearing:
  # the mixin modules import the shim so test code can monkeypatch symbols on
  # ``openzim_mcp.zim_operations`` (e.g. ``patch("openzim_mcp.zim_operations.
  # zim_archive")``) and have the patch reach the call site. The cycle is safe
  # because the imports are only ever dereferenced at call time, never at
  # module-import time.
  #
  # Note: query-filter clauses are AND-ed; specifying ``tags contain: <X>``
  # alongside ``id:`` requires the rule to carry that tag. ``py/cyclic-import``
  # has the ``maintainability`` tag, but ``py/unsafe-cyclic-import`` does
  # not — so we filter by id alone here.
  - exclude:
      id: py/cyclic-import
  - exclude:
      id: py/unsafe-cyclic-import

  # ``ZimOperations`` mixes in four mixin classes. Several mixin methods are
  # forward-declared inside ``if TYPE_CHECKING:`` blocks on peer mixins so the
  # type checker can resolve cross-mixin calls without a runtime cycle. CodeQL
  # does not honor ``TYPE_CHECKING`` and reports these as conflicting
  # attributes; the conflict does not exist at runtime because only the real
  # implementation is defined outside the ``TYPE_CHECKING`` guard.
  - exclude:
      id: py/conflicting-attributes

  # Test-only style nits that fire on intentional patterns:
  #  - ``py/not-named-self``: inner ``class FakeCtx`` context managers defined
  #    inside test methods use ``self_inner`` for ``__enter__`` / ``__exit__``
  #    to avoid shadowing the enclosing test method's ``self``. Renaming to
  #    ``self`` would compile but obscure the intent.
  #  - ``py/import-and-import-from``: a handful of tests pair a top-of-file
  #    ``from openzim_mcp.X import Y`` with a deferred ``import openzim_mcp.X``
  #    inside a test function on purpose — to exercise re-import paths or to
  #    keep a module reference for monkeypatching.
  #  - ``py/ineffectual-statement``: ``await <cancelled_task>`` to drain a
  #    cancelled coroutine produces no value but is the documented way to
  #    surface a CancelledError before the test exits.
  - exclude:
      id: py/not-named-self
  - exclude:
      id: py/import-and-import-from
  - exclude:
      id: py/ineffectual-statement
