name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v0.3.0) - Leave empty to create a new tag from main"
        required: false
        type: string
      create_tag:
        description: "Create the tag if it does not exist"
        required: false
        type: boolean
        default: false
      release_type:
        description: "Type of release (for new tags only)"
        required: false
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  validate-and-prepare:
    name: Validate and Prepare Release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write # Pushes a new tag when create_tag input is true
    outputs:
      tag_name: ${{ steps.prepare.outputs.tag_name }}
      should_create_tag: ${{ steps.prepare.outputs.should_create_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate and prepare release
        id: prepare
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            # Use provided tag
            TAG="${{ github.event.inputs.tag }}"
            if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
              echo "Error: Invalid tag format. Expected format: v1.2.3"
              exit 1
            fi
          else
            # Generate new tag based on release type
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            echo "Latest tag: $LATEST_TAG"

            # Extract version numbers
            VERSION=${LATEST_TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

            # Increment based on release type
            case "${{ github.event.inputs.release_type }}" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac

            TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "tag_name=$TAG" >> $GITHUB_OUTPUT

          # Check if tag exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "should_create_tag=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists"
          else
            echo "should_create_tag=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG will be created"
          fi

      - name: Create tag if needed
        if: steps.prepare.outputs.should_create_tag == 'true' && github.event.inputs.create_tag == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.prepare.outputs.tag_name }}" -m "Release ${{ steps.prepare.outputs.tag_name }}"
          git push origin "${{ steps.prepare.outputs.tag_name }}"
          echo "Created and pushed tag ${{ steps.prepare.outputs.tag_name }}"

      - name: Fail if tag doesn't exist and creation not requested
        if: steps.prepare.outputs.should_create_tag == 'true' && github.event.inputs.create_tag != 'true'
        run: |
          echo "Error: Tag ${{ steps.prepare.outputs.tag_name }} does not exist and create_tag is false"
          echo "Either set create_tag to true or create the tag manually first"
          exit 1

  test:
    name: Test before release
    runs-on: ubuntu-latest
    needs: [validate-and-prepare]
    if: always() && (needs.validate-and-prepare.result == 'success' || needs.validate-and-prepare.result == 'skipped')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && (needs.validate-and-prepare.outputs.tag_name || github.event.inputs.tag) || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv sync

      - name: Run tests
        run: |
          make check

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [validate-and-prepare, test]
    if: always() && needs.test.result == 'success'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && (needs.validate-and-prepare.outputs.tag_name || github.event.inputs.tag) || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Build package
        run: |
          uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

      # The .mcpb bundle (Smithery listing + Claude Desktop one-click extension)
      # is built into a SEPARATE directory/artifact, never dist/. The
      # publish-pypi job uploads everything in the `dist` artifact to PyPI, and a
      # .mcpb is not a valid distribution — keeping it out of `dist` avoids a
      # failed/garbage PyPI upload. create-release merges it back in for the
      # GitHub release only. `uv run` syncs the project venv (installs openzim_mcp
      # + libzim) before running, which build_mcpb.py needs to spawn the server
      # and capture live tool schemas.
      - name: Build .mcpb bundle
        run: uv run python scripts/build_mcpb.py --output dist-mcpb

      - name: Upload .mcpb bundle
        uses: actions/upload-artifact@v7
        with:
          name: mcpb
          path: dist-mcpb/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [validate-and-prepare, build]
    # Only run PyPI deployment when triggered by tag push or when workflow_dispatch provides a valid tag
    if: always() && needs.build.result == 'success' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (needs.validate-and-prepare.outputs.tag_name || github.event.inputs.tag)))
    environment:
      name: pypi
      url: https://pypi.org/p/openzim-mcp
    permissions:
      id-token: write # Required for trusted publishing to PyPI
    steps:
      - name: Validate deployment context
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Head branch: ${{ github.head_ref || github.ref_name }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ needs.validate-and-prepare.outputs.tag_name || github.event.inputs.tag }}"
            echo "Tag input: $TAG"
            # Ensure the tag input is provided and starts with 'v'
            if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
              echo "Error: Invalid tag format. Expected format: v1.2.3"
              exit 1
            fi
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          skip-existing: true

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-and-prepare, build, publish-pypi]
    if: always() && needs.publish-pypi.result == 'success'
    permissions:
      contents: write # Creates GitHub release and uploads release assets
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && (needs.validate-and-prepare.outputs.tag_name || github.event.inputs.tag) || github.ref }}

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      # Merge the .mcpb bundle (+ its .sha256) into dist/ so the existing
      # dist/* upload paths below attach it to the GitHub release. This artifact
      # is intentionally kept out of the PyPI publish (see the build job).
      - name: Download .mcpb bundle
        uses: actions/download-artifact@v8
        with:
          name: mcpb
          path: dist/

      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ needs.validate-and-prepare.outputs.tag_name || github.event.inputs.tag }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Tag name: $TAG_NAME"

      - name: Check if release already exists
        id: check-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag_name }}"
          echo "Checking if release exists for tag: $TAG_NAME"

          if gh release view "$TAG_NAME" --json tagName >/dev/null 2>&1; then
            echo "release_exists=true" >> $GITHUB_OUTPUT
            echo "✅ Release already exists for $TAG_NAME (created by release-please)"
          else
            echo "release_exists=false" >> $GITHUB_OUTPUT
            echo "📝 Release does not exist for $TAG_NAME, will create new release"
          fi

      - name: Extract release notes
        id: extract-notes
        run: |
          # Extract version from tag
          TAG_NAME="${{ steps.tag.outputs.tag_name }}"
          VERSION=${TAG_NAME#v}  # Remove 'v' prefix if present
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Extract release notes from CHANGELOG.md
          python -c "
          import re
          import sys

          version = '$VERSION'
          print(f'Extracting release notes for version: {version}')

          with open('CHANGELOG.md', 'r') as f:
              content = f.read()

          # Try multiple patterns to find the version section
          patterns = [
              # Pattern 1: [0.3.3] format
              r'## \[' + re.escape(version) + r'\].*?\n(.*?)(?=\n## \[|\n# |\Z)',
              # Pattern 2: v0.3.3 format
              r'## \[v' + re.escape(version) + r'\].*?\n(.*?)(?=\n## \[|\n# |\Z)',
              # Pattern 3: Without brackets
              r'## ' + re.escape(version) + r'.*?\n(.*?)(?=\n## |\n# |\Z)',
              # Pattern 4: With v prefix
              r'## v' + re.escape(version) + r'.*?\n(.*?)(?=\n## |\n# |\Z)'
          ]

          notes = None
          for pattern in patterns:
              match = re.search(pattern, content, re.DOTALL)
              if match:
                  notes = match.group(1).strip()
                  print(f'Found release notes using pattern: {pattern[:50]}...')
                  break

          if notes and len(notes) > 10:  # Ensure we have substantial content
              with open('release_notes.md', 'w') as f:
                  f.write(notes)
              print(f'Release notes extracted successfully ({len(notes)} characters)')
          else:
              fallback_notes = f'## Release {version}\n\nThis release includes various improvements and bug fixes. See the full changelog for details.'
              with open('release_notes.md', 'w') as f:
                  f.write(fallback_notes)
              print('Using fallback release notes')
          " VERSION="$VERSION"

      - name: Upload assets to existing release
        if: steps.check-release.outputs.release_exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG_NAME="${{ steps.tag.outputs.tag_name }}"
          echo "📦 Uploading build artifacts to existing release: $TAG_NAME"

          # Upload each file in dist/. A swallowed upload failure here is
          # unrecoverable: under immutable releases the "Publish draft release"
          # step below locks the asset list, so a warning-and-continue produces a
          # permanently asset-less published release with a green pipeline (the
          # rc0/rc1 empty-Releases failure mode). Fail the job instead.
          upload_count=0
          for file in dist/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              echo "Uploading: $filename"
              # Use --clobber to overwrite if asset already exists.
              gh release upload "$TAG_NAME" "$file" --clobber
              upload_count=$((upload_count + 1))
            fi
          done

          if [ "$upload_count" -eq 0 ]; then
            echo "::error::No artifacts found in dist/ to upload to $TAG_NAME"
            exit 1
          fi

          echo "✅ Uploaded $upload_count asset(s) to release $TAG_NAME"

      - name: Create new release (draft)
        # Manual `git tag` push path: no release-please draft shell exists,
        # so this step creates one. On repos with immutable releases enabled,
        # assets can only be uploaded WHILE the release is a draft — publishing
        # locks the asset list. softprops/action-gh-release uploads the dist
        # artifacts as part of the draft creation in this branch; the
        # "Publish draft release" step below then flips draft -> published.
        # rc0 and rc1 both shipped with empty Releases pages because this
        # step used to set draft: false (single-shot create+publish), which
        # failed on the asset-upload step under immutable releases.
        if: steps.check-release.outputs.release_exists != 'true'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: Release v${{ steps.extract-notes.outputs.version }}
          body_path: release_notes.md
          files: |
            dist/*
          draft: true
          # Use the resolved tag name (works for workflow_dispatch where
          # github.ref is the source branch, not the release tag).
          prerelease: ${{ contains(steps.tag.outputs.tag_name, 'alpha') || contains(steps.tag.outputs.tag_name, 'beta') || contains(steps.tag.outputs.tag_name, 'rc') }}

      - name: Publish draft release
        # Both paths converge here:
        #   - release-please path: "Upload assets to existing release" above
        #     populated a release-please-created draft with assets.
        #   - manual-tag-push path: "Create new release (draft)" above created
        #     a fresh draft with assets.
        # In both cases the release is a draft at this point; flip it to
        # published. On repos with immutable releases enabled, this step is
        # what makes assets visible on the Releases page — once published,
        # GitHub locks the asset list, so the order
        # (create-draft → upload-assets → publish) is load-bearing.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag_name }}"
          # Verify it's actually a draft before flipping — release-please
          # may have already published it, or someone may have manually
          # published it. Either way, "edit --draft=false" on an already-
          # published release is a no-op, so this is safe.
          if gh release view "$TAG_NAME" --json isDraft --jq .isDraft | grep -qi true; then
            echo "🚀 Publishing draft release: $TAG_NAME"
            gh release edit "$TAG_NAME" --draft=false
            echo "✅ Release $TAG_NAME published"
          else
            echo "ℹ️  Release $TAG_NAME is already published — nothing to do"
          fi
