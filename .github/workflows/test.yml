name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Cap wall-clock so a hung step (network stall, deadlocked test) fails fast
    # instead of riding GitHub's 6h default. Generous vs the ~10m normal run.
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv sync

      - name: Run linting
        run: |
          make lint

      - name: Run type checking
        run: |
          make type-check

      - name: Run unit tests
        run: |
          make test-cov

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate coverage summary
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          uv run coverage report >> $GITHUB_STEP_SUMMARY || echo "Coverage report not available" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          if [ "${CODECOV_TOKEN}" = "" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "INFO: **Codecov not configured** - Coverage reports are generated locally only." >> $GITHUB_STEP_SUMMARY
            echo "To enable Codecov uploads, add CODECOV_TOKEN to repository secrets." >> $GITHUB_STEP_SUMMARY
          fi
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports as artifacts
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            coverage.xml
            htmlcov/
          retention-days: 30

      - name: Codecov setup reminder
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && env.CODECOV_TOKEN == ''
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          echo "INFO: Codecov token not configured. Coverage reports will not be uploaded."
          echo "To enable Codecov:"
          echo "1. Sign up at https://codecov.io and link your repository"
          echo "2. Get your repository upload token"
          echo "3. Add it as CODECOV_TOKEN in GitHub repository secrets"
          echo "4. Re-run this workflow to upload coverage reports"

  test-reranker:
    name: Test [reranker] extra on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    # Backstop for a HuggingFace download *hang* (vs a 5xx, which the retry
    # loop below already rides out). A stall otherwise burned the full 6h
    # default and cancelled the whole CI run (the v2.1.5 release commit).
    timeout-minutes: 35
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies with [reranker] extra
        run: |
          uv sync --extra reranker

      - name: Pre-stage reranker test model (retry transient HF outages)
        run: |
          # The live reranker tests download Xenova/ms-marco-MiniLM-L-6-v2
          # from HuggingFace at test time. HF's CDN intermittently 5xx's
          # mid-run (CI run #800: one runner downloaded fine, another got a
          # CloudFront error on the same commit). Pre-stage here with our
          # own backoff — wider than fastembed's internal ~40s — to ride
          # out transient blips before pytest runs. We deliberately never
          # fail this step: if staging still can't complete, the
          # `_require_live_model` fixture skips the download-dependent tests
          # so an external outage never red-X's main.
          staged=0
          for attempt in 1 2 3 4 5; do
            # Bound each attempt with `timeout`: a 5xx returns fast and retries,
            # but a stalled connection has no response to react to and would
            # otherwise hang until the job's wall-clock limit. timeout turns a
            # hang into a failed attempt that this same retry/skip path handles,
            # so an HF stall degrades to "tests skip" rather than a 6h cancel.
            # --kill-after forces SIGKILL if the downloader ignores SIGTERM.
            if timeout --kill-after=30s 240s \
                 uv run openzim-mcp download-models \
                 --reranker-model-id Xenova/ms-marco-MiniLM-L-6-v2; then
              echo "reranker model staged on attempt ${attempt}"
              staged=1
              break
            fi
            if [ "${attempt}" -lt 5 ]; then
              backoff=$((attempt * 20))
              echo "::warning::reranker model download attempt ${attempt} failed; retrying in ${backoff}s"
              sleep "${backoff}"
            fi
          done
          if [ "${staged}" -ne 1 ]; then
            echo "::warning::reranker model could not be pre-staged after 5 attempts; live tests will skip if HuggingFace stays unreachable"
          fi

      - name: Run ml tests including requires_reranker marker
        run: |
          uv run pytest tests/ml/ -v

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv sync

      - name: Run bandit security linter
        run: |
          # ``bandit-sarif-formatter`` registers the ``sarif`` output format used
          # below; without it ``bandit -f sarif`` fails with "invalid choice: 'sarif'".
          uv run pip install bandit[toml] bandit-sarif-formatter
          # ``--exit-zero`` keeps the real report that ``-o`` already wrote: bandit
          # exits 1 whenever it finds ANY issue, and the previous ``|| echo '{}' >``
          # fallback then clobbered the populated report with an empty one, so the
          # SARIF uploaded to the Security tab and the summary count were always
          # fabricated as zero. ``-c pyproject.toml`` applies the project [tool.bandit]
          # config (e.g. the B101 assert skip) which was otherwise ignored here.
          # This step is intentionally non-blocking (truthful reporting only); the
          # blocking severity gate is ``make security`` (bandit -ll) at release time.
          uv run bandit -c pyproject.toml -r openzim_mcp --exit-zero -f json -o bandit-report.json
          # Also generate SARIF format for GitHub Security tab
          uv run bandit -c pyproject.toml -r openzim_mcp --exit-zero -f sarif -o bandit-report.sarif

      - name: Upload Bandit SARIF results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('bandit-report.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: bandit-report.sarif
          category: bandit

      # Blocking dependency-vulnerability gate on every PR/push. Previously this
      # job ran only a non-blocking ``safety check`` whose ``|| echo`` fallback
      # always wrote an empty report (and the Safety CLI is deprecated), so a
      # newly-vulnerable transitive dependency passed CI and was caught only by
      # the release-time ``make security`` run. pip-audit (already a dev
      # dependency, and the same tool that gate uses) closes that window.
      # --skip-editable so it doesn't try to resolve the editable openzim-mcp
      # project itself on PyPI. Placed after the bandit steps so their reports
      # still upload when a dependency advisory fails this step.
      - name: Run pip-audit dependency scan (blocking)
        run: uv run pip-audit --skip-editable

      - name: Generate security scan summary
        if: always() && hashFiles('bandit-report.json') != ''
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY

          if [ -f "bandit-report.json" ]; then
            echo "### Bandit Security Linter" >> $GITHUB_STEP_SUMMARY
            BANDIT_ISSUES=$(jq '.results | length' bandit-report.json 2>/dev/null || echo "0")
            if [ "$BANDIT_ISSUES" = "0" ]; then
              echo "[OK] No security issues found by Bandit" >> $GITHUB_STEP_SUMMARY
            else
              echo "[WARN] Found $BANDIT_ISSUES potential security issues" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "**Security reports available as artifacts** - Download for detailed analysis" >> $GITHUB_STEP_SUMMARY

      - name: Code scanning setup reminder
        if: always() && hashFiles('bandit-report.sarif') != ''
        run: |
          echo "INFO: Security scan completed. SARIF report generated."
          echo "To enable GitHub Code Scanning:"
          echo "1. Go to repository Settings → Security & analysis"
          echo "2. Enable 'Code scanning alerts'"
          echo "3. Re-run this workflow to upload security findings to GitHub Security tab"
          echo "4. Or download the security-reports artifact to view results locally"

      - name: Upload security scan results
        uses: actions/upload-artifact@v7
        if: always() && (hashFiles('bandit-report.json') != '' || hashFiles('bandit-report.sarif') != '')
        with:
          name: security-reports
          path: |
            bandit-report.json
            bandit-report.sarif

  test-comprehensive:
    name: Comprehensive Testing
    runs-on: ubuntu-latest
    # Heaviest job (downloads the ZIM testing suite + full + slow suites);
    # cap it so a hung ZIM-data fetch can't ride the 6h default either.
    timeout-minutes: 45
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv sync

      - name: Download all ZIM test data
        run: |
          make download-test-data-all

      - name: Run comprehensive tests
        run: |
          ZIM_TEST_DATA_DIR=test_data/zim-testing-suite uv run pytest --cov=openzim_mcp --cov-report=xml --cov-report=term-missing

      - name: Run slow tests
        run: |
          # Exit code 5 means no tests collected; tolerate it until tests are marked
          # @pytest.mark.slow. Capture pytest's exit code into RC explicitly so the
          # tolerance check doesn't depend on the readability-fragile `cmd || [ $? -eq N ]`
          # idiom.
          RC=0
          uv run pytest -m "slow" --maxfail=5 || RC=$?
          [ "$RC" -eq 0 ] || [ "$RC" -eq 5 ]

      - name: Upload comprehensive coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./coverage.xml
          flags: comprehensive
          name: codecov-comprehensive
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
