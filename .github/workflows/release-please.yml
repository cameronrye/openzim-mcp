name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          # Pure manifest mode. release-type, changelog-sections, extra-files
          # (the llms.txt x-release-please-version bump) and every other knob
          # all come from release-please-config.json.
          #
          # Do NOT re-add a `release-type:` input here. Passing release-type
          # alongside config-file/manifest-file forces the action into simple
          # mode, which silently IGNORES the config file — extra-files and
          # changelog-sections never apply (that bug pinned website/public/
          # llms.txt at an old version across v2.1.2–v2.1.4).
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

          # Let release-please own tag creation and the GitHub release shell
          # (changelog body). release.yml's create-release job detects an
          # existing release and uploads the wheel/sdist into it rather than
          # creating a duplicate. Without this, release-please does not set
          # `release_created=true` on its outputs, and the trigger-release /
          # trigger-docker-publish jobs below stay perpetually skipped — the
          # symptom that bit v1.0.1 (release PR merged but never tagged).

          # Token for creating PRs and releases
          token: ${{ secrets.GITHUB_TOKEN }}

  # Optional: Add a job to notify about release PR creation
  notify-release-pr:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.pr && !needs.release-please.outputs.release_created
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        # release-please's ``pr`` output is a JSON object (not a URL string
        # as an earlier iteration of this workflow assumed). Pass it via an
        # env var and JSON.parse to avoid embedding the body content into
        # the github-script source, which previously broke when commit
        # subjects contained single-quoted tokens like ``plumb 'rc1'``.
        uses: actions/github-script@v9
        env:
          RELEASE_PR_JSON: ${{ needs.release-please.outputs.pr }}
        with:
          script: |
            const raw = process.env.RELEASE_PR_JSON;
            if (!raw) {
              console.log('No PR data found');
              return;
            }
            let prData;
            try {
              prData = JSON.parse(raw);
            } catch (e) {
              console.log('Failed to JSON.parse release-please pr output:', e.message);
              return;
            }
            const prNumber = prData && prData.number;
            if (!prNumber) {
              console.log('release-please pr output had no .number field');
              return;
            }
            console.log(`Found PR number: ${prNumber}`);

            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `🤖 **Automated Release PR Created**

                This PR was automatically created by release-please based on conventional commits.

                **What this PR does:**
                - Updates version numbers in all relevant files
                - Updates CHANGELOG.md with new release notes
                - Prepares for automated release when merged

                **To release:**
                1. Review the changes in this PR
                2. Merge this PR to automatically create a new release

                **To modify:**
                - Edit the files directly in this PR if needed
                - The release will use the final state when merged

                For more information, see the [versioning documentation](README.md#versioning).`
              });
              console.log('Comment added successfully');
            } catch (error) {
              console.log('Failed to add comment:', error.message);
            }

  # Keep uv.lock's root-package version in lockstep with each release PR.
  # release-please bumps pyproject.toml but cannot touch the auto-generated
  # uv.lock: there is no x-release-please annotation hook for a TOML lockfile,
  # and uv would strip any comment we added. So the lockfile's own ``version``
  # field drifts one release behind every cut (it sat at 2.2.1 while
  # pyproject.toml was already 2.2.2). Whenever release-please opens/updates the
  # release PR, regenerate uv.lock on that branch and commit it back so the bump
  # ships inside the same PR. ``uv lock`` rewrites only the root version line
  # here — dependencies are re-resolved only if pyproject's requirements
  # changed — so this is a one-line, churn-free commit. GITHUB_TOKEN pushes do
  # not retrigger CI, but release PRs never run the required checks anyway (they
  # are merged via admin), so nothing is gated on this commit. Worst case (this
  # job fails): the lockfile drifts for that release exactly as it does today —
  # a release is never blocked or broken by this job.
  sync-uv-lock:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.pr && !needs.release-please.outputs.release_created
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: release-please--branches--main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Regenerate uv.lock for the bumped version
        run: uv lock

      - name: Commit lockfile if it changed
        run: |
          if git diff --quiet uv.lock; then
            echo "uv.lock already in sync — nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "chore: sync uv.lock to release version"
          git push origin HEAD:release-please--branches--main

  # Validate version synchronization after release creation
  validate-release:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Validate version synchronization
        run: |
          echo "🔍 Validating version synchronization for ${{ needs.release-please.outputs.tag_name }}"

          # Extract version from tag
          TAG_VERSION="${{ needs.release-please.outputs.version }}"
          echo "Expected version: $TAG_VERSION"

          # pyproject.toml and the release-please manifest are the two
          # static sources of truth. ``openzim_mcp/__init__.py`` derives
          # ``__version__`` dynamically via ``importlib.metadata`` from the
          # installed wheel, which itself reads pyproject.toml — so a
          # static grep there has no value, and using ``importlib.metadata``
          # without first ``pip install``ing the package would just hit the
          # PackageNotFoundError fallback.
          PYPROJECT_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "pyproject.toml version: $PYPROJECT_VERSION"

          MANIFEST_VERSION=$(jq -r '."."' .release-please-manifest.json)
          echo "manifest version: $MANIFEST_VERSION"

          if [ "$TAG_VERSION" = "$PYPROJECT_VERSION" ] && [ "$TAG_VERSION" = "$MANIFEST_VERSION" ]; then
            echo "✅ All versions are synchronized!"
          else
            echo "❌ Version mismatch detected!"
            echo "Tag: $TAG_VERSION"
            echo "pyproject.toml: $PYPROJECT_VERSION"
            echo "manifest: $MANIFEST_VERSION"
            exit 1
          fi

      - name: Notify release created
        run: |
          echo "🎉 Release ${{ needs.release-please.outputs.tag_name }} created and validated!"
          echo "Version: ${{ needs.release-please.outputs.version }}"
          echo "The release workflow will now be triggered automatically."

  # Trigger the release workflow when a release is created
  trigger-release:
    runs-on: ubuntu-latest
    needs: [release-please, validate-release]
    if: needs.release-please.outputs.release_created && needs.validate-release.result == 'success'
    permissions:
      actions: write
    steps:
      - name: Trigger release workflow
        uses: actions/github-script@v9
        with:
          script: |
            const tagName = '${{ needs.release-please.outputs.tag_name }}';
            console.log(`Triggering release workflow for tag: ${tagName}`);

            try {
              const result = await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'release.yml',
                ref: 'main',
                inputs: {
                  tag: tagName,
                  create_tag: 'false'
                }
              });
              console.log('✅ Release workflow triggered successfully');
              console.log(`Workflow dispatch result: ${result.status}`);
            } catch (error) {
              console.error('❌ Failed to trigger release workflow:', error.message);
              throw error;
            }

  # Trigger the docker-publish workflow when a release is created.
  # Tag pushes from release-please use GITHUB_TOKEN, which GitHub explicitly
  # blocks from triggering downstream workflows — so the `push: tags` trigger
  # on docker-publish.yml never fires for bot-created releases. We dispatch
  # it explicitly here, mirroring the trigger-release pattern above.
  trigger-docker-publish:
    runs-on: ubuntu-latest
    needs: [release-please, validate-release]
    if: needs.release-please.outputs.release_created && needs.validate-release.result == 'success'
    permissions:
      actions: write
    steps:
      - name: Trigger docker-publish workflow
        uses: actions/github-script@v9
        with:
          script: |
            const tagName = '${{ needs.release-please.outputs.tag_name }}';
            console.log(`Triggering docker-publish workflow for tag: ${tagName}`);

            try {
              const result = await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'docker-publish.yml',
                ref: 'main',
                inputs: {
                  tag: tagName
                }
              });
              console.log('✅ docker-publish workflow triggered successfully');
              console.log(`Workflow dispatch result: ${result.status}`);
            } catch (error) {
              console.error('❌ Failed to trigger docker-publish workflow:', error.message);
              throw error;
            }
