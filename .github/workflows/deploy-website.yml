name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install deps
        working-directory: website
        run: npm ci

      - name: Type-check
        working-directory: website
        run: npx astro check

      - name: Build Astro site
        working-directory: website
        run: npm run build
        env:
          BUILD_SHA: ${{ github.sha }}
          BUILD_REF: ${{ github.ref_name }}

      - name: Stamp build info
        run: |
          echo "Built on: $(date -u +%Y-%m-%dT%H:%M:%SZ)" > website/dist/build-info.txt
          echo "Commit: ${{ github.sha }}" >> website/dist/build-info.txt
          echo "Branch: ${{ github.ref_name }}" >> website/dist/build-info.txt

      - name: List built files
        run: find website/dist -maxdepth 3 -type f | head -40

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # Optional: Update benchmark results page to include link to main site
  update-benchmark-integration:
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    permissions:
      contents: read
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        continue-on-error: true
        id: checkout-gh-pages
        with:
          ref: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add navigation to benchmark page
        if: steps.checkout-gh-pages.outcome == 'success'
        run: |
          # Check if there's a benchmark index.html and add navigation
          if [ -f "index.html" ] && grep -q "benchmark" "index.html"; then
            echo "Adding navigation link to main site in benchmark page..."

            # Create a simple navigation header if it doesn't exist
            if ! grep -q "main-site-nav" "index.html"; then
              # Add navigation at the top of the body
              sed -i '/<body[^>]*>/a\
              <div id="main-site-nav" style="background: #2563eb; color: white; padding: 10px; text-align: center; margin-bottom: 20px;">\
                <a href="/" style="color: white; text-decoration: none; font-weight: bold;">← Back to OpenZIM MCP Main Site</a>\
              </div>' "index.html"

              echo "Navigation added to benchmark page"
            else
              echo "Navigation already exists in benchmark page"
            fi
          else
            echo "No benchmark page found or not a benchmark page"
          fi

      - name: Commit changes
        if: steps.checkout-gh-pages.outcome == 'success'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add .
            git commit -m "Add navigation link to main site in benchmark page"
            git push
            echo "Changes committed and pushed"
          fi
