name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install deps
        working-directory: website
        run: npm ci

      - name: Type-check
        working-directory: website
        run: npx astro check

      - name: Build Astro site
        working-directory: website
        run: npm run build
        env:
          BUILD_SHA: ${{ github.sha }}
          BUILD_REF: ${{ github.ref_name }}

      - name: Stamp build info
        run: |
          echo "Built on: $(date -u +%Y-%m-%dT%H:%M:%SZ)" > website/dist/build-info.txt
          echo "Commit: ${{ github.sha }}" >> website/dist/build-info.txt
          echo "Branch: ${{ github.ref_name }}" >> website/dist/build-info.txt

      - name: List built files
        run: find website/dist -maxdepth 3 -type f | head -40

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
