sonar.projectKey=cameronrye_openzim-mcp
sonar.organization=cameronrye

# Source / test layout
sonar.sources=openzim_mcp,website
sonar.tests=tests
sonar.python.version=3.12,3.13
sonar.exclusions=htmlcov/**,dist/**,.venv/**,wiki-content/**,docs/**

# Test files exercise local-only patterns that fire security-hotspot rules
# meant for production code. Each rule below is intentionally scoped away
# from test paths after manual review:
#
# * python:S5443 (publicly writable directories): tests use /tmp- and
#   tempfile-style paths to validate path-validation behaviour. The runtime
#   impact is bounded to the test process.
# * python:S5332 (insecure http://): tests target a local subprocess server
#   bound to 127.0.0.1; HTTPS would require a self-signed cert and add no
#   security value at the loopback boundary.
# * python:S1313 (hardcoded private IP): tests assert behaviour against
#   non-loopback private RFC1918 addresses to verify the auth/CORS gates;
#   the literals are deliberately illustrative, never reachable at runtime.
sonar.issue.ignore.multicriteria=t1,t2,t3,t4
sonar.issue.ignore.multicriteria.t1.ruleKey=python:S5443
sonar.issue.ignore.multicriteria.t1.resourceKey=tests/**
sonar.issue.ignore.multicriteria.t2.ruleKey=python:S5332
sonar.issue.ignore.multicriteria.t2.resourceKey=tests/**
sonar.issue.ignore.multicriteria.t3.ruleKey=python:S1313
sonar.issue.ignore.multicriteria.t3.resourceKey=tests/**
# githubactions:S7637 (full commit SHA pin) is deferred for v1.0 — every
# workflow in this repo uses major-tag pins (managed by Dependabot). The
# transition to SHA pinning is tracked as a follow-up; flagging only
# docker-publish.yml when the convention is repo-wide creates noise.
sonar.issue.ignore.multicriteria.t4.ruleKey=githubactions:S7637
sonar.issue.ignore.multicriteria.t4.resourceKey=.github/workflows/**
