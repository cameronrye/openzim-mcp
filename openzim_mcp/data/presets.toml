# Archive-type presets (v2.5 #17). Keyed by detected type. All keys are
# optional; a missing key inherits the global default. Only types with a
# [preset.<type>] table get behavior. a1 shipped wikipedia + stackexchange;
# a2 added the Stack Exchange answer score-prefix trim (code, in
# zim/content.py). The wiktionary (gloss) and ted (transcript) presets are
# deferred — a 2026-06-16 live probe showed ted2zim transcripts live in
# text/vtt subtitle files (not body headings) so a heading slice can't work,
# and no mwoffliner wiktionary archive was available to pin a gloss token.

[preset.wikipedia]
# Explicit baseline == current defaults; makes the baseline testable.
summary_style = "first_section"

[preset.stackexchange]
# The one real behavior change in a1. q_and_a summaries surface the
# accepted-answer section; the wider snippet shows more of the Q&A body.
# max_paragraphs = 3 was validated in the v2.2.0 live superuser reprobe:
# it covers the question plus the start of the accepted answer in SE search
# snippets without dragging in trailing answers.
summary_style = "q_and_a"
max_paragraphs = 3
