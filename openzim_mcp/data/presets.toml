# Archive-type presets (v2.5 #17). Keyed by detected type. All keys are
# optional; a missing key inherits the global default. Only types with a
# [preset.<type>] table get behavior. a1 shipped wikipedia + stackexchange;
# a2 adds wiktionary (gloss) and ted (transcript) below.

[preset.wikipedia]
# Explicit baseline == current defaults; makes the baseline testable.
summary_style = "first_section"

[preset.stackexchange]
# The one real behavior change in a1. q_and_a summaries surface the
# accepted-answer section; the wider snippet shows more of the Q&A body.
# max_paragraphs = 3 was validated in the v2.2.0 live superuser reprobe:
# it covers the question plus the start of the accepted answer in SE search
# snippets without dragging in trailing answers.
summary_style = "q_and_a"
max_paragraphs = 3

[preset.wiktionary]
# a2: gloss summaries surface the first part-of-speech sense rather than the
# Etymology/Pronunciation lead. live-reprobe-pending: heading tokens not yet
# validated against a real mwoffliner wiktionary archive (see
# _GLOSS_HEADING_TOKENS); a miss falls back to the first-section slice.
summary_style = "gloss"

[preset.ted]
# a2: transcript summaries surface the talk transcript rather than the
# About/description lead. live-reprobe-pending: heading token not yet
# validated against a real ted2zim archive (see _TRANSCRIPT_HEADING_TOKENS);
# a miss falls back to the first-section slice.
summary_style = "transcript"
